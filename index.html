<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevTrack</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0e0e0f;
  --bg2: #141415;
  --bg3: #1a1a1c;
  --bg4: #222224;
  --border: #2a2a2d;
  --border2: #333336;
  --text: #e8e8ea;
  --text2: #8a8a90;
  --text3: #555558;
  --accent: #4f8eff;
  --accent-dim: #1a2d4f;
  --green: #3ecf8e;
  --green-dim: #0d2e1f;
  --red: #f05151;
  --red-dim: #2e0f0f;
  --amber: #f0a030;
  --amber-dim: #2e1e06;
  --purple: #a78bfa;
  --purple-dim: #1e1535;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --radius: 6px;
  --radius-lg: 10px;
  --panel-w: 480px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 13px; display: flex; flex-direction: column; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* TOP BAR */
#topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px; height: 48px; min-height: 48px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.logo { font-family: var(--mono); font-weight: 500; font-size: 14px; color: var(--text); letter-spacing: -0.02em; }
.logo span { color: var(--accent); }
#topbar-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); font-family: var(--sans); font-size: 12px; cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn:hover { border-color: var(--border2); background: var(--bg4); color: var(--text); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #6a9fff; border-color: #6a9fff; color: #fff; }
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { background: var(--bg3); border-color: var(--border); }
.btn-icon { padding: 6px; }
.btn-sm { padding: 4px 9px; font-size: 11px; }
.btn-danger { color: var(--red); border-color: transparent; background: transparent; }
.btn-danger:hover { background: var(--red-dim); border-color: var(--red); }

/* MAIN LAYOUT */
#main { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
#sidebar {
  width: 220px; min-width: 220px; background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-header { padding: 14px 14px 8px; display: flex; align-items: center; justify-content: space-between; }
.sidebar-label { font-size: 10px; font-weight: 500; letter-spacing: .08em; color: var(--text3); text-transform: uppercase; font-family: var(--mono); }
.project-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
.project-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px; border-radius: var(--radius); cursor: pointer;
  transition: background .1s; margin-bottom: 1px;
  border: 1px solid transparent;
}
.project-item:hover { background: var(--bg3); }
.project-item.active { background: var(--bg4); border-color: var(--border); }
.project-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.project-name { flex: 1; font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.project-count { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.sidebar-footer { padding: 10px 8px; border-top: 1px solid var(--border); }

/* CONTENT */
#content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* PROJECT HEADER */
#proj-header {
  padding: 14px 20px 0; border-bottom: 1px solid var(--border);
  background: var(--bg2); flex-shrink: 0;
}
.proj-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.proj-title { font-size: 16px; font-weight: 600; color: var(--text); }
.proj-status-badge { font-size: 10px; font-family: var(--mono); padding: 2px 7px; border-radius: 99px; }
.proj-actions { margin-left: auto; display: flex; gap: 6px; }

/* STATS */
.stats-row { display: flex; gap: 2px; margin-bottom: 12px; flex-wrap: wrap; }
.stat-chip {
  background: var(--bg3); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: var(--radius);
  display: flex; align-items: center; gap: 6px;
}
.stat-num { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); }
.stat-lbl { font-size: 11px; color: var(--text3); }

/* VIEW TABS + FILTERS */
.view-bar { display: flex; align-items: center; gap: 8px; padding-bottom: 0; flex-wrap: wrap; }
.view-tabs { display: flex; }
.view-tab { padding: 7px 14px; font-size: 12px; font-family: var(--mono); color: var(--text3); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: all .15s; }
.view-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.view-tab:hover { color: var(--text2); }
.filters { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
.filter-input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-size: 12px; padding: 5px 10px; border-radius: var(--radius); outline: none; }
.filter-input:focus { border-color: var(--accent); }
select.filter-input { cursor: pointer; }

/* KANBAN */
#kanban-view { flex: 1; overflow-x: auto; overflow-y: hidden; padding: 16px 20px; }
.kanban-board { display: flex; gap: 10px; height: 100%; min-width: max-content; }
.kanban-col { width: 220px; display: flex; flex-direction: column; flex-shrink: 0; }
.col-header { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; padding: 0 2px; }
.col-dot { width: 6px; height: 6px; border-radius: 50%; }
.col-name { font-size: 11px; font-weight: 500; font-family: var(--mono); color: var(--text2); text-transform: uppercase; letter-spacing: .06em; flex: 1; }
.col-cnt { font-size: 10px; font-family: var(--mono); color: var(--text3); background: var(--bg3); padding: 1px 6px; border-radius: 99px; }
.col-body { flex: 1; overflow-y: auto; padding: 2px 2px 40px; }

/* TASK CARD */
.task-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 10px 12px; margin-bottom: 6px;
  cursor: pointer; transition: border-color .15s, transform .1s;
  position: relative;
}
.task-card:hover { border-color: var(--border2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.3); }
.task-card.drag-target { border-color: var(--accent); }
.card-top { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 6px; }
.card-title { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.4; flex: 1; }
.type-badge { font-size: 9px; font-family: var(--mono); padding: 2px 6px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; }
.card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.priority-dot { width: 5px; height: 5px; border-radius: 50%; }
.card-tags { display: flex; gap: 3px; flex-wrap: wrap; }
.tag { font-size: 9px; font-family: var(--mono); padding: 1px 5px; border-radius: 3px; background: var(--bg4); color: var(--text3); border: 1px solid var(--border); }
.card-date { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-left: auto; }

/* TABLE VIEW */
#table-view { flex: 1; overflow: auto; padding: 16px 20px; display: none; }
table { width: 100%; border-collapse: collapse; }
thead th { text-align: left; padding: 8px 10px; font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); cursor: pointer; white-space: nowrap; }
thead th:hover { color: var(--text2); }
tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
tbody tr:hover { background: var(--bg3); }
tbody td { padding: 9px 10px; color: var(--text); vertical-align: middle; }
td.title-cell { font-weight: 500; max-width: 280px; }
td.title-cell span { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td.muted { color: var(--text3); font-family: var(--mono); font-size: 11px; }

/* EMPTY STATE */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text3); gap: 10px; }
.empty-state .big { font-size: 32px; }
.empty-state p { font-size: 13px; }

/* DETAIL PANEL */
#detail-panel {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: var(--panel-w); background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform .2s cubic-bezier(.4,0,.2,1);
  z-index: 50; overflow: hidden;
}
#detail-panel.open { transform: translateX(0); }
.panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.panel-title-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
.panel-title { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; line-height: 1.4; cursor: text; border: 1px solid transparent; border-radius: var(--radius); padding: 2px 4px; background: transparent; font-family: var(--sans); outline: none; transition: border-color .15s; }
.panel-title:hover { border-color: var(--border); }
.panel-title:focus { border-color: var(--accent); background: var(--bg3); }
.panel-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: var(--radius); transition: color .15s; flex-shrink: 0; }
.panel-close:hover { color: var(--text); }
.panel-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.meta-select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-size: 11px; padding: 3px 8px; border-radius: var(--radius); outline: none; cursor: pointer; }
.meta-select:focus { border-color: var(--accent); }

/* PANEL TABS */
.panel-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 16px; flex-shrink: 0; }
.panel-tab { padding: 9px 12px; font-size: 11px; font-family: var(--mono); color: var(--text3); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: all .15s; }
.panel-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.panel-tab:hover { color: var(--text2); }

/* PANEL BODY */
.panel-body { flex: 1; overflow-y: auto; padding: 16px; }
.panel-section { display: none; }
.panel-section.active { display: block; }
.field-label { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.field-block { margin-bottom: 18px; }
textarea.panel-input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); font-family: var(--sans); font-size: 13px;
  padding: 10px 12px; border-radius: var(--radius-lg); outline: none;
  resize: vertical; min-height: 90px; transition: border-color .15s;
  line-height: 1.6;
}
textarea.panel-input:focus { border-color: var(--accent); }
.prompt-wrap { position: relative; }
.prompt-copy { position: absolute; top: 8px; right: 8px; font-size: 10px; font-family: var(--mono); padding: 3px 8px; }
.prompt-copy.copied { color: var(--green); border-color: var(--green); }

/* TAGS INPUT */
.tags-wrap { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; padding: 7px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-lg); min-height: 36px; cursor: text; }
.tags-wrap:focus-within { border-color: var(--accent); }
.tag-chip { display: flex; align-items: center; gap: 3px; background: var(--bg4); border: 1px solid var(--border2); color: var(--text2); font-size: 10px; font-family: var(--mono); padding: 2px 7px; border-radius: 3px; }
.tag-chip button { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 12px; padding: 0 0 0 2px; line-height: 1; }
.tag-chip button:hover { color: var(--red); }
#tag-input { background: none; border: none; color: var(--text); font-family: var(--mono); font-size: 11px; outline: none; min-width: 80px; flex: 1; }

/* NOTES */
.note-item { padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 8px; }
.note-ts { font-size: 10px; font-family: var(--mono); color: var(--text3); margin-bottom: 4px; }
.note-text { font-size: 13px; color: var(--text); line-height: 1.6; white-space: pre-wrap; }
.note-add-wrap { display: flex; flex-direction: column; gap: 6px; }
.note-add-wrap textarea { min-height: 60px; }

/* PANEL FOOTER */
.panel-footer { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.panel-footer-meta { font-size: 10px; font-family: var(--mono); color: var(--text3); }

/* MODALS */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; display: none; align-items: center; justify-content: center; }
.modal-backdrop.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 20px; width: 420px; max-width: 95vw; }
.modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
.form-field { margin-bottom: 12px; }
.form-field label { display: block; font-size: 11px; font-family: var(--mono); color: var(--text3); margin-bottom: 5px; }
.form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: var(--sans); font-size: 13px; padding: 8px 10px; border-radius: var(--radius); outline: none; }
.form-input:focus { border-color: var(--accent); }
select.form-input { cursor: pointer; }
.form-row { display: flex; gap: 10px; }
.form-row .form-field { flex: 1; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.color-picker { display: flex; gap: 6px; flex-wrap: wrap; }
.color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .1s; }
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: var(--text); }

/* NO PROJECT STATE */
#no-project { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text3); }
#no-project h2 { font-size: 18px; color: var(--text2); font-weight: 400; }
#no-project p { font-size: 13px; }

/* STATUS / PRIORITY COLORS */
.p-critical { color: var(--red); }
.p-high { color: var(--amber); }
.p-medium { color: var(--accent); }
.p-low { color: var(--text3); }
.t-feature { background: var(--accent-dim); color: var(--accent); }
.t-bug { background: var(--red-dim); color: var(--red); }
.t-fix { background: var(--amber-dim); color: var(--amber); }
.t-idea { background: var(--green-dim); color: var(--green); }
.t-chore { background: var(--bg4); color: var(--text3); }

/* ANIMATIONS */
@keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes cardPop { from { opacity: 0; transform: scale(.94) translateY(4px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes dropFlash { 0%,100% { background: var(--bg2); } 50% { background: var(--accent-dim); } }
.task-card { animation: cardPop .18s cubic-bezier(.34,1.3,.64,1) both; }

/* DRAG & DROP */
.task-card {
  user-select: none;
  -webkit-user-select: none;
}
.task-card.dragging {
  opacity: 0;
  pointer-events: none;
}
.task-card.drop-above::before,
.task-card.drop-below::after {
  content: '';
  display: block;
  height: 3px;
  background: var(--accent);
  border-radius: 99px;
  margin: 2px 0;
  animation: fadeIn .1s ease;
}
@keyframes fadeIn { from { opacity: 0; scaleX: .8; } to { opacity: 1; scaleX: 1; } }
.task-card.drop-above { padding-top: 14px; }
.task-card.drop-below { padding-bottom: 14px; }

.col-body {
  transition: background .15s;
}
.col-body.drag-over-empty {
  background: var(--accent-dim);
  border-radius: var(--radius-lg);
  outline: 1.5px dashed var(--accent);
  outline-offset: -2px;
}
.col-body.drag-over-empty .drop-hint { display: flex; }

.drop-hint {
  display: none;
  align-items: center;
  justify-content: center;
  height: 48px;
  border-radius: var(--radius-lg);
  color: var(--accent);
  font-size: 11px;
  font-family: var(--mono);
  margin-bottom: 6px;
  opacity: .7;
}

/* drag ghost — rendered off-screen via JS */
#drag-ghost {
  position: fixed;
  top: -1000px;
  left: -1000px;
  width: 210px;
  background: var(--bg2);
  border: 1px solid var(--accent);
  border-radius: var(--radius-lg);
  padding: 10px 12px;
  pointer-events: none;
  box-shadow: 0 12px 40px rgba(0,0,0,.6), 0 0 0 1px var(--accent);
  z-index: 9999;
  font-family: var(--sans);
  font-size: 12px;
  color: var(--text);
  opacity: .95;
  transform: rotate(1.5deg);
}

/* SCROLLABLE CONTENT AREA */
#view-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* ═══════════════════════════════════════════════════════
   RESPONSIVE — MOBILE & TABLET
   ═══════════════════════════════════════════════════════ */

/* Mobile overlay */
#mobile-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 80;
  backdrop-filter: blur(2px);
}
#mobile-overlay.active { display: block; }

/* Bottom nav */
#mobile-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 58px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  z-index: 100;
  align-items: stretch;
  padding: 0 4px;
  padding-bottom: env(safe-area-inset-bottom);
}
.mobile-nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: none;
  border: none;
  color: var(--text3);
  font-size: 9px;
  font-family: var(--mono);
  letter-spacing: .04em;
  cursor: pointer;
  border-radius: var(--radius);
  transition: color .15s, background .15s;
  padding: 6px 4px;
}
.mobile-nav-btn.active { color: var(--accent); }
.mobile-nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

/* Hamburger button in topbar */
#sidebar-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  padding: 4px 6px;
  border-radius: var(--radius);
}
#sidebar-toggle svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }
#sidebar-toggle:hover { background: var(--bg3); }

/* ── TABLET 768–1024px ── */
@media (max-width: 1024px) {
  #sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    z-index: 85;
    transform: translateX(-100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    width: 260px !important;
    min-width: 260px !important;
  }
  #sidebar.mobile-visible { transform: translateX(0); }
  #sidebar-toggle { display: flex; }
  #main { overflow: visible; }
  #content { overflow: hidden; }
  .kanban-col { width: 200px; }
}

/* ── MOBILE ≤767px ── */
@media (max-width: 767px) {
  :root { --panel-w: 100vw; }

  #topbar { padding: 0 12px; gap: 8px; }
  .logo { font-size: 13px; }
  #topbar-actions .btn span { display: none; }

  #mobile-nav { display: flex; }
  #main { padding-bottom: 58px; }

  /* Sidebar full width panel on mobile */
  #sidebar {
    width: 100vw !important;
    min-width: 100vw !important;
    max-width: 320px !important;
  }

  /* Project header compact */
  #proj-header { padding: 10px 12px 0; }
  .proj-title { font-size: 14px; }
  .proj-actions .btn-ghost { padding: 5px 8px; font-size: 11px; }
  .stats-row { gap: 4px; margin-bottom: 8px; overflow-x: auto; flex-wrap: nowrap; }
  .stat-chip { flex-shrink: 0; }
  .view-bar { gap: 6px; }
  .filters { gap: 4px; flex-wrap: nowrap; overflow-x: auto; }
  .filter-input { flex-shrink: 0; font-size: 11px; padding: 4px 7px; }
  #search-input { width: 120px !important; }

  /* Kanban horizontal scroll on mobile */
  #kanban-view { padding: 10px 12px; }
  .kanban-board { gap: 8px; }
  .kanban-col { width: 240px; }
  .col-body { padding-bottom: 60px; }

  /* Table view */
  #table-view { padding: 10px 12px; }
  thead th:nth-child(4),
  thead th:nth-child(5),
  tbody td:nth-child(4),
  tbody td:nth-child(5) { display: none; }

  /* Detail panel full screen */
  #detail-panel {
    width: 100% !important;
    border-left: none;
    border-top: 1px solid var(--border);
  }
  .panel-body { padding-bottom: 80px; }

  /* Modals */
  .modal { width: 96vw; max-width: 96vw; padding: 16px; }
  .modal-btns { flex-wrap: wrap; }
  .modal-btns .btn { flex: 1; justify-content: center; min-width: 80px; }
  .form-row { flex-direction: column; gap: 0; }
}

/* ── SMALL PHONES ≤430px ── */
@media (max-width: 430px) {
  #proj-header { padding: 8px 10px 0; }
  .proj-title { font-size: 13px; }
  .kanban-col { width: 220px; }
  .view-tab { padding: 7px 10px; font-size: 11px; }
  #search-input { width: 100px !important; }
}

/* ── LANDSCAPE PHONE ── */
@media (max-width: 767px) and (orientation: landscape) {
  #mobile-nav { height: 48px; }
  #main { padding-bottom: 48px; }
  .col-body { padding-bottom: 55px; }
}

/* Safe area */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  #mobile-nav { padding-bottom: calc(env(safe-area-inset-bottom) + 4px); height: calc(58px + env(safe-area-inset-bottom)); }
  @media (max-width: 767px) { #main { padding-bottom: calc(58px + env(safe-area-inset-bottom)); } }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <button id="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle projects">
    <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="logo">dev<span>track</span></div>
  <div id="topbar-actions">
    <button class="btn btn-ghost btn-sm" onclick="exportData()">↓ <span>export</span></button>
    <label class="btn btn-ghost btn-sm" style="cursor:pointer">↑ <span>import</span><input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
    <button class="btn btn-ghost btn-sm" onclick="authSignOut()" title="Sign out" style="color:var(--text3)">⏻</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-label">Projects</span>
      <button class="btn btn-ghost btn-icon btn-sm" onclick="openNewProject()" title="New project">+</button>
    </div>
    <div class="project-list" id="project-list"></div>
    <div class="sidebar-footer">
      <button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="openNewProject()">+ New project</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <div id="no-project">
      <div style="font-size:36px">📋</div>
      <h2>No project selected</h2>
      <p>Create a project to get started</p>
      <button class="btn btn-primary" onclick="openNewProject()">+ New project</button>
    </div>

    <div id="project-view" style="display:none;flex-direction:column;height:100%;overflow:hidden;flex:1">
      <!-- PROJECT HEADER -->
      <div id="proj-header">
        <div class="proj-title-row">
          <div class="proj-title" id="proj-title-text"></div>
          <span class="proj-status-badge" id="proj-status-badge"></span>
          <div class="proj-actions">
            <button class="btn btn-ghost btn-sm" onclick="openNewTask()">+ Task</button>
            <button class="btn btn-ghost btn-sm" onclick="editProject()">⚙</button>
          </div>
        </div>
        <div class="stats-row" id="stats-row"></div>
        <div class="view-bar">
          <div class="view-tabs">
            <button class="view-tab active" onclick="switchView('kanban')" id="tab-kanban">Kanban</button>
            <button class="view-tab" onclick="switchView('table')" id="tab-table">Table</button>
          </div>
          <div class="filters">
            <input class="filter-input" id="search-input" placeholder="Search tasks..." oninput="renderView()" style="width:160px">
            <select class="filter-input" id="filter-type" onchange="renderView()">
              <option value="">All types</option>
              <option>Feature</option><option>Bug</option><option>Fix</option><option>Idea</option><option>Chore</option>
            </select>
            <select class="filter-input" id="filter-priority" onchange="renderView()">
              <option value="">All priorities</option>
              <option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
            </select>
          </div>
        </div>
      </div>

      <!-- VIEW AREA -->
      <div id="view-area">
        <!-- KANBAN -->
        <div id="kanban-view">
          <div class="kanban-board" id="kanban-board"></div>
        </div>

        <!-- TABLE -->
        <div id="table-view">
          <table>
            <thead>
              <tr>
                <th onclick="sortTable('title')">Title ↕</th>
                <th onclick="sortTable('type')">Type ↕</th>
                <th onclick="sortTable('status')">Status ↕</th>
                <th onclick="sortTable('priority')">Priority ↕</th>
                <th onclick="sortTable('updated')">Updated ↕</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- DETAIL PANEL -->
    <div id="detail-panel">
      <div class="panel-header">
        <div class="panel-title-row">
          <textarea class="panel-title" id="panel-title" rows="1" oninput="autoResize(this);updateTaskField('title',this.value)"></textarea>
          <button class="panel-close" onclick="closePanel()">×</button>
        </div>
        <div class="panel-meta">
          <select class="meta-select" id="panel-type" onchange="updateTaskField('task_type',this.value);renderView()">
            <option>Feature</option><option>Bug</option><option>Fix</option><option>Idea</option><option>Chore</option>
          </select>
          <select class="meta-select" id="panel-status" onchange="updateTaskField('status',this.value);renderView()">
            <option>Backlog</option><option>Todo</option><option>In Progress</option><option>Review</option><option>Done</option>
          </select>
          <select class="meta-select" id="panel-priority" onchange="updateTaskField('priority',this.value);renderView()">
            <option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
          </select>
        </div>
      </div>
      <div class="panel-tabs">
        <button class="panel-tab active" onclick="switchPanelTab('overview')">Overview</button>

          <div class="field-block">
            <div class="field-label">Description</div>
            <textarea class="panel-input" id="panel-desc" placeholder="Describe this task..." rows="5" oninput="updateTaskField('description',this.value)"></textarea>
          </div>

            <div class="field-label">Tags</div>
            <div class="tags-wrap" onclick="document.getElementById('tag-input').focus()">
              <div id="tags-display"></div>
              <input id="tag-input" placeholder="add tag, enter" onkeydown="handleTagInput(event)">

        <!-- PROMPT -->
        <div class="panel-section" id="panel-prompt">
          <div class="field-block">
            <div class="field-label">AI / Vibe-code prompt</div>
            <div class="prompt-wrap">
              <textarea class="panel-input" id="panel-prompt-text" placeholder="Paste your prompt here — the one you feed to the AI for this task..." rows="12" oninput="updateTaskField('prompt',this.value)"></textarea>
              <button class="btn btn-ghost btn-sm prompt-copy" id="prompt-copy-btn" onclick="copyPrompt()">copy</button>
            </div>
          </div>

        <!-- NOTES -->
        <div class="panel-section" id="panel-notes">
          <div class="note-add-wrap field-block">
            <div class="field-label">Add note</div>
            <textarea class="panel-input" id="new-note-input" placeholder="Write a note..." rows="3"></textarea>
            <div style="display:flex;justify-content:flex-end">
              <button class="btn btn-primary btn-sm" onclick="addNote()">+ Add note</button>
            </div>

          <div id="notes-list"></div>
        </div>
      </div>
      <div class="panel-footer">
        <span class="panel-footer-meta" id="panel-dates"></span>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="duplicateTask()">duplicate</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTask()">delete</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- NEW PROJECT MODAL -->
<div class="modal-backdrop" id="modal-project">
  <div class="modal">
    <h2 id="modal-project-title">New project</h2>
    <div class="form-field">
      <label>Project name</label>
      <input class="form-input" id="proj-name-input" placeholder="My awesome app...">
    </div>
    <div class="form-field">
      <label>Description</label>
      <input class="form-input" id="proj-desc-input" placeholder="What are you building?">
    </div>
    <div class="form-field">
      <label>Tech stack</label>
      <input class="form-input" id="proj-stack-input" placeholder="e.g. HTML / CSS / JS">
    </div>
    <div class="form-row">
      <div class="form-field">
        <label>Status</label>
        <select class="form-input" id="proj-status-input">
          <option>Active</option><option>Paused</option><option>Archived</option>
        </select>
      </div>
      <div class="form-field">
        <label>Color</label>
        <div class="color-picker" id="color-picker"></div>
      </div>

    <div class="modal-btns">
      <button class="btn btn-danger" id="delete-project-btn" onclick="deleteProject()" style="display:none;margin-right:auto">delete project</button>
      <button class="btn" onclick="closeProjectModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject()">Save</button>

  </div>
</div>

<!-- NEW TASK MODAL -->
<div class="modal-backdrop" id="modal-task">
  <div class="modal">
    <h2>New task</h2>
    <div class="form-field">
      <label>Title</label>
      <input class="form-input" id="task-title-input" placeholder="What needs to be done?">
    </div>
    <div class="form-row">
      <div class="form-field">
        <label>Type</label>
        <select class="form-input" id="task-type-input">
          <option>Feature</option><option>Bug</option><option>Fix</option><option>Idea</option><option>Chore</option>
        </select>
      </div>
      <div class="form-field">
        <label>Status</label>
        <select class="form-input" id="task-status-input">
          <option>Backlog</option><option>Todo</option><option>In Progress</option><option>Review</option><option>Done</option>
        </select>
      </div>
    </div>
    <div class="form-field">
      <label>Priority</label>
      <select class="form-input" id="task-priority-input">
        <option>Medium</option><option>Critical</option><option>High</option><option>Low</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeTaskModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewTask()">Create task</button>
    </div>
  </div>
</div>

<script>
// ─── SUPABASE ──────────────────────────────────────────────
const SUPABASE_URL = 'https://vccpdyhxmfzgvgpqfzgm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjY3BkeWh4bWZ6Z3ZncHFmemdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDI1NjIsImV4cCI6MjA5MDk3ODU2Mn0.HzDXgkU-UIg0F35BLvhYfaen9vdGOl0oNBSM5NiZq3A';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const COLORS = ['#4f8eff','#3ecf8e','#f0a030','#f05151','#a78bfa','#f06292','#26c6da','#ffb74d'];
const STATUSES = ['Backlog','Todo','In Progress','Review','Done'];
const STATUS_DOTS = { 'Backlog':'#555558', 'Todo':'#4f8eff', 'In Progress':'#f0a030', 'Review':'#a78bfa', 'Done':'#3ecf8e' };
const PRIORITY_ORDER = { 'Critical':0,'High':1,'Medium':2,'Low':3 };

let state = { projects: [], tasks: [], activeProjectId: null };
let currentTaskId = null;
let currentView = 'kanban';
let sortCol = 'updated', sortDir = -1;
let editingProjectId = null;
let selectedColor = COLORS[0];

// ─── STORAGE ───────────────────────────────────────────────
async function save() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;

  if (state._pendingProjects && state._pendingProjects.length) {
    const rows = state._pendingProjects.map(p => ({
      id: p.id, user_id: user.id, name: p.name,
      description: p.description || '', stack: p.stack || '',
      status: p.status, color: p.color, created_at: p.created
    }));
    const { error } = await sb.from('projects').upsert(rows, { onConflict: 'id' });
    if (error) console.error('Project save error:', error.message, error.details);
    else state._pendingProjects = [];
  }

  if (state._pendingTasks && state._pendingTasks.length) {
    const rows = state._pendingTasks.map(t => ({
      id: t.id, user_id: user.id, project_id: t.projectId,
      title: t.title, task_type: t.task_type || t.type || 'Feature', status: t.status, priority: t.priority,
      description: t.description || '', prompt: t.prompt || '',
      tags: t.tags || [], notes: t.notes || [],
      archived: t.archived || false,
      created_at: t.created, updated_at: t.updated
    }));
    const { error } = await sb.from('tasks').upsert(rows, { onConflict: 'id' });
    if (error) console.error('Task save error:', error.message, error.details);
    else state._pendingTasks = [];
  }
}

// Queue a project to be saved
function queueProject(id) {
  if (!state._pendingProjects) state._pendingProjects = [];
  const p = state.projects.find(x => x.id === id);
  if (p && !state._pendingProjects.find(x => x.id === id)) state._pendingProjects.push(p);
  debouncedSave();
}
function queueTask(id) {
  if (!state._pendingTasks) state._pendingTasks = [];
  const t = state.tasks.find(x => x.id === id);
  if (t && !state._pendingTasks.find(x => x.id === id)) state._pendingTasks.push(t);
  debouncedSave();
}
function queueAll() {
  state._pendingProjects = [...state.projects];
  state._pendingTasks = [...state.tasks];
  debouncedSave();
}

let _saveTimer = null;
function debouncedSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(save, 600);
}

async function deleteProjectFromDB(id) {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;
  await sb.from('tasks').delete().eq('project_id', id).eq('user_id', user.id);
  await sb.from('projects').delete().eq('id', id).eq('user_id', user.id);
}
async function deleteTaskFromDB(id) {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;
  await sb.from('tasks').delete().eq('id', id).eq('user_id', user.id);
}

async function load() {
  showLoading(true);
  const { data: { user }, error: authErr } = await sb.auth.getUser();
  if (!user) { showLoading(false); showAuth(); return; }

  const [{ data: projects, error: pe }, { data: tasks, error: te }] = await Promise.all([
    sb.from('projects').select('*').order('created_at', { ascending: true }),
    sb.from('tasks').select('*').order('created_at', { ascending: true }),
  ]);

  if (pe || te) { console.error(pe || te); showLoading(false); return; }

  state.projects = (projects || []).map(p => ({
    id: p.id, name: p.name, description: p.description,
    stack: p.stack, status: p.status, color: p.color, created: p.created_at
  }));
  state.tasks = (tasks || []).map(t => ({
    id: t.id, projectId: t.project_id, title: t.title,
    type: t.task_type || t.type, status: t.status, priority: t.priority,
    description: t.description, prompt: t.prompt,
    tags: t.tags || [], notes: t.notes || [],
    archived: t.archived, created: t.created_at, updated: t.updated_at
  }));
  state.activeProjectId = state.projects.length ? state.projects[0].id : null;
  state._pendingProjects = [];
  state._pendingTasks = [];

  showLoading(false);
  renderSidebar();
  if (state.activeProjectId) activateProject(state.activeProjectId, false);
  else { document.getElementById('no-project').style.display = 'flex'; }
}

// ─── SIDEBAR ───────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('project-list');
  if (!state.projects.length) { el.innerHTML = `<div style="padding:12px 8px;color:var(--text3);font-size:12px">No projects yet</div>`; return; }
  el.innerHTML = state.projects.map(p => {
    const cnt = state.tasks.filter(t => t.projectId === p.id && !t.archived).length;
    return `<div class="project-item${p.id===state.activeProjectId?' active':''}" onclick="activateProject('${p.id}')">
      <div class="project-dot" style="background:${p.color}"></div>
      <span class="project-name">${esc(p.name)}</span>
      <span class="project-count">${cnt}</span>
    </div>`;
  }).join('');
}

function activateProject(id, doSave=true) {
  state.activeProjectId = id;
  // doSave is ignored — saving is handled by queueProject/queueTask explicitly
  const p = state.projects.find(x => x.id === id);
  if (!p) return;
  document.getElementById('no-project').style.display = 'none';
  document.getElementById('project-view').style.display = 'flex';
  document.getElementById('proj-title-text').textContent = p.name;
  const badge = document.getElementById('proj-status-badge');
  badge.textContent = p.status;
  badge.style.background = p.status==='Active'?'var(--green-dim)':p.status==='Paused'?'var(--amber-dim)':'var(--bg4)';
  badge.style.color = p.status==='Active'?'var(--green)':p.status==='Paused'?'var(--amber)':'var(--text3)';
  renderSidebar();
  renderStats();
  renderView();
  closePanel();
}

// ─── STATS ─────────────────────────────────────────────────
function renderStats() {
  const tasks = activeTasks();
  const done = tasks.filter(t => t.status==='Done').length;
  const bugs = tasks.filter(t => (t.task_type||t.type)==='Bug').length;
  const ip = tasks.filter(t => t.status==='In Progress').length;
  const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-chip"><span class="stat-num">${tasks.length}</span><span class="stat-lbl">tasks</span></div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--red)">${bugs}</span><span class="stat-lbl">bugs</span></div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--amber)">${ip}</span><span class="stat-lbl">in progress</span></div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--green)">${pct}%</span><span class="stat-lbl">done</span></div>
  `;
}

// ─── FILTERING ─────────────────────────────────────────────
function activeTasks() {
  return state.tasks.filter(t => t.projectId===state.activeProjectId && !t.archived);
}
function filteredTasks() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const ft = document.getElementById('filter-type').value;
  const fp = document.getElementById('filter-priority').value;
  return activeTasks().filter(t => {
    if (q && !t.title.toLowerCase().includes(q) && !(t.description||'').toLowerCase().includes(q)) return false;
    if (ft && (t.task_type||t.type) !== ft) return false;
    if (fp && t.priority !== fp) return false;
    return true;
  });
}

// ─── VIEW SWITCHING ────────────────────────────────────────
function switchView(v) {
  currentView = v;
  document.getElementById('kanban-view').style.display = v==='kanban' ? 'block' : 'none';
  document.getElementById('table-view').style.display = v==='table' ? 'block' : 'none';
  document.getElementById('tab-kanban').classList.toggle('active', v==='kanban');
  document.getElementById('tab-table').classList.toggle('active', v==='table');
  renderView();
}
function renderView() {
  renderStats();
  if (currentView==='kanban') renderKanban(); else renderTable();
}

// ─── KANBAN ────────────────────────────────────────────────
function renderKanban() {
  const board = document.getElementById('kanban-board');
  const tasks = filteredTasks();
  board.innerHTML = STATUSES.map(status => {
    const col = tasks.filter(t => t.status===status);
    const colId = status.replace(/ /g,'_');
    return `<div class="kanban-col">
      <div class="col-header">
        <div class="col-dot" style="background:${STATUS_DOTS[status]}"></div>
        <div class="col-name">${status}</div>
        <div class="col-cnt">${col.length}</div>
      </div>
      <div class="col-body" id="col-${colId}" data-status="${status}"
        ondragover="onColDragOver(event,this)"
        ondragleave="onColDragLeave(event,this)"
        ondrop="onColDrop(event,'${status}',this)">
        <div class="drop-hint">drop here</div>
        ${col.map(t => taskCard(t)).join('')}
      </div>
    </div>`;
  }).join('');
}

function taskCard(t) {
  const typeClass = 't-'+(t.task_type||t.type||'feature').toLowerCase();
  const pClass = 'p-'+t.priority.toLowerCase();
  const tags = (t.tags||[]).slice(0,3).map(tag=>`<span class="tag">${esc(tag)}</span>`).join('');
  return `<div class="task-card" draggable="true" data-id="${t.id}"
    onclick="openTask('${t.id}')"
    ondragstart="onDragStart(event,'${t.id}')"
    ondragend="onDragEnd(event)"
    ontouchstart="onTouchStart(event,'${t.id}')">
    <div class="card-top">
      <div class="card-title">${esc(t.title)}</div>
      <span class="type-badge ${typeClass}">${t.task_type||t.type||'Feature'}</span>
    </div>
    <div class="card-meta">
      <div class="priority-dot ${pClass}" style="background:currentColor;width:5px;height:5px;border-radius:50%"></div>
      <span style="font-size:10px;font-family:var(--mono)" class="${pClass}">${t.priority}</span>
      ${tags ? `<div class="card-tags">${tags}</div>` : ''}
      <span class="card-date">${fmtDate(t.updated||t.created)}</span>
    </div>
  </div>`;
}

// ─── DRAG & DROP ───────────────────────────────────────────
let dragTaskId = null;
let dragGhost = null;
let dragOverCard = null;
let dragOverPos = null; // 'above' | 'below'
let dragOverCol = null;
let dragOffsetX = 0, dragOffsetY = 0;

function createGhost(card, title) {
  const g = document.createElement('div');
  g.id = 'drag-ghost';
  g.innerHTML = `<div style="font-size:12px;font-weight:500;line-height:1.4;color:var(--text)">${esc(title)}</div>`;
  document.body.appendChild(g);
  return g;
}

function onDragStart(e, id) {
  dragTaskId = id;
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();
  dragOffsetX = e.clientX - rect.left;
  dragOffsetY = e.clientY - rect.top;

  const task = state.tasks.find(t => t.id === id);
  dragGhost = createGhost(card, task ? task.title : '');

  // Use a transparent 1x1 px image as the native ghost so our custom one shows
  const blank = document.createElement('canvas');
  blank.width = 1; blank.height = 1;
  e.dataTransfer.setDragImage(blank, 0, 0);
  e.dataTransfer.effectAllowed = 'move';

  requestAnimationFrame(() => card.classList.add('dragging'));
}

function onDragEnd(e) {
  if (dragGhost) { dragGhost.remove(); dragGhost = null; }
  // Remove all drag indicators
  document.querySelectorAll('.task-card.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.task-card.drop-above').forEach(el => el.classList.remove('drop-above'));
  document.querySelectorAll('.task-card.drop-below').forEach(el => el.classList.remove('drop-below'));
  document.querySelectorAll('.col-body.drag-over-empty').forEach(el => el.classList.remove('drag-over-empty'));
  dragTaskId = null; dragOverCard = null; dragOverPos = null; dragOverCol = null;
}

document.addEventListener('dragover', e => {
  e.preventDefault();
  if (!dragGhost) return;
  dragGhost.style.left = (e.clientX - dragOffsetX) + 'px';
  dragGhost.style.top  = (e.clientY - dragOffsetY) + 'px';
});

function onColDragOver(e, colEl) {
  e.preventDefault(); e.stopPropagation();
  e.dataTransfer.dropEffect = 'move';

  // Find if cursor is over a specific card
  const cards = [...colEl.querySelectorAll('.task-card:not(.dragging)')];

  // Clear previous indicators
  document.querySelectorAll('.task-card.drop-above').forEach(el => el.classList.remove('drop-above'));
  document.querySelectorAll('.task-card.drop-below').forEach(el => el.classList.remove('drop-below'));
  document.querySelectorAll('.col-body.drag-over-empty').forEach(el => el.classList.remove('drag-over-empty'));

  if (!cards.length) {
    colEl.classList.add('drag-over-empty');
    dragOverCard = null; dragOverPos = 'empty'; dragOverCol = colEl;
    return;
  }

  let targetCard = null, targetPos = 'below';
  for (const card of cards) {
    const rect = card.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    if (e.clientY < mid) { targetCard = card; targetPos = 'above'; break; }
    targetCard = card; targetPos = 'below';
  }

  if (targetCard) {
    targetCard.classList.add(targetPos === 'above' ? 'drop-above' : 'drop-below');
    dragOverCard = targetCard;
    dragOverPos = targetPos;
    dragOverCol = colEl;
  }
}

function onColDragLeave(e, colEl) {
  // Only clear if we're actually leaving the column (not entering a child)
  if (!colEl.contains(e.relatedTarget)) {
    colEl.classList.remove('drag-over-empty');
    document.querySelectorAll('.task-card.drop-above').forEach(el => el.classList.remove('drop-above'));
    document.querySelectorAll('.task-card.drop-below').forEach(el => el.classList.remove('drop-below'));
  }
}

function onColDrop(e, status, colEl) {
  e.preventDefault();
  if (!dragTaskId) return;

  const task = state.tasks.find(t => t.id === dragTaskId);
  if (!task) return;

  // Figure out insert position
  const cards = [...colEl.querySelectorAll('.task-card:not(.dragging)')];
  let insertBeforeId = null;

  if (dragOverCard && dragOverPos) {
    const targetId = dragOverCard.dataset.id;
    const targetIdx = cards.findIndex(c => c.dataset.id === targetId);
    if (dragOverPos === 'above') {
      insertBeforeId = targetId;
    } else {
      insertBeforeId = cards[targetIdx + 1]?.dataset.id || null;
    }
  }

  // Update status
  const oldStatus = task.status;
  task.status = status;
  task.updated = new Date().toISOString();

  // Reorder in state
  const idx = state.tasks.indexOf(task);
  state.tasks.splice(idx, 1);

  if (insertBeforeId) {
    const targetIdx = state.tasks.findIndex(t => t.id === insertBeforeId);
    state.tasks.splice(targetIdx, 0, task);
  } else {
    // Insert at end of this status group
    const lastIdxInStatus = state.tasks.reduce((acc, t, i) => t.status === status ? i : acc, -1);
    if (lastIdxInStatus === -1) {
      state.tasks.unshift(task);
    } else {
      state.tasks.splice(lastIdxInStatus + 1, 0, task);
    }
  }

  queueTask(task.id);

  // Clean up indicators before re-render
  document.querySelectorAll('.task-card.drop-above').forEach(el => el.classList.remove('drop-above'));
  document.querySelectorAll('.task-card.drop-below').forEach(el => el.classList.remove('drop-below'));
  colEl.classList.remove('drag-over-empty');

  renderView();
  dragTaskId = null; dragOverCard = null; dragOverPos = null;
}

// Touch drag support for mobile
let touchDragId = null, touchGhost = null, touchOffX = 0, touchOffY = 0;

function onTouchStart(e, id) {
  // Only initiate if held for 150ms (avoid blocking scroll)
  const card = e.currentTarget;
  touchDragId = id;
  const touch = e.touches[0];
  const rect = card.getBoundingClientRect();
  touchOffX = touch.clientX - rect.left;
  touchOffY = touch.clientY - rect.top;

  const task = state.tasks.find(t => t.id === id);
  touchGhost = createGhost(card, task ? task.title : '');
  touchGhost.style.left = (touch.clientX - touchOffX) + 'px';
  touchGhost.style.top  = (touch.clientY - touchOffY) + 'px';
  card.classList.add('dragging');
}

function onTouchMove(e) {
  if (!touchDragId || !touchGhost) return;
  e.preventDefault();
  const touch = e.touches[0];
  touchGhost.style.left = (touch.clientX - touchOffX) + 'px';
  touchGhost.style.top  = (touch.clientY - touchOffY) + 'px';

  // Find drop target
  touchGhost.style.display = 'none';
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  touchGhost.style.display = '';
  if (!el) return;

  const colBody = el.closest('.col-body');
  if (colBody) {
    document.querySelectorAll('.col-body.drag-over-empty').forEach(c => c.classList.remove('drag-over-empty'));
    document.querySelectorAll('.task-card.drop-above,.task-card.drop-below').forEach(c => { c.classList.remove('drop-above'); c.classList.remove('drop-below'); });

    const cards = [...colBody.querySelectorAll('.task-card:not(.dragging)')];
    if (!cards.length) { colBody.classList.add('drag-over-empty'); return; }

    let found = false;
    for (const card of cards) {
      const rect = card.getBoundingClientRect();
      if (touch.clientY < rect.top + rect.height / 2) {
        card.classList.add('drop-above');
        dragOverCard = card; dragOverPos = 'above'; dragOverCol = colBody;
        found = true; break;
      }
      dragOverCard = card; dragOverPos = 'below'; dragOverCol = colBody;
    }
    if (!found && dragOverCard) dragOverCard.classList.add('drop-below');
  }
}

function onTouchEnd(e) {
  if (!touchDragId) return;
  if (touchGhost) { touchGhost.remove(); touchGhost = null; }
  document.querySelectorAll('.task-card.dragging').forEach(c => c.classList.remove('dragging'));

  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  if (el) {
    const colBody = el.closest('.col-body');
    if (colBody) {
      const status = colBody.dataset.status;
      dragTaskId = touchDragId;
      onColDrop({ preventDefault: ()=>{} }, status, colBody);
    }
  }

  document.querySelectorAll('.col-body.drag-over-empty').forEach(c => c.classList.remove('drag-over-empty'));
  document.querySelectorAll('.task-card.drop-above,.task-card.drop-below').forEach(c => { c.classList.remove('drop-above'); c.classList.remove('drop-below'); });
  touchDragId = null; dragOverCard = null; dragOverPos = null;
}

document.addEventListener('touchmove', onTouchMove, { passive: false });
document.addEventListener('touchend', onTouchEnd);

// ─── TABLE ─────────────────────────────────────────────────
function sortTable(col) {
  if (sortCol===col) sortDir *= -1; else { sortCol=col; sortDir=1; }
  renderTable();
}
function renderTable() {
  const tasks = filteredTasks().sort((a,b) => {
    let av = a[sortCol]||'', bv = b[sortCol]||'';
    if (sortCol==='priority') { av=PRIORITY_ORDER[av]??99; bv=PRIORITY_ORDER[bv]??99; return (av-bv)*sortDir; }
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  const tbody = document.getElementById('table-body');
  if (!tasks.length) { tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text3)">No tasks found</td></tr>`; return; }
  tbody.innerHTML = tasks.map(t => {
    const tc='t-'+(t.task_type||t.type||'feature').toLowerCase(), pc='p-'+t.priority.toLowerCase();
    return `<tr onclick="openTask('${t.id}')">
      <td class="title-cell"><span>${esc(t.title)}</span></td>
      <td><span class="type-badge ${tc}">${t.task_type||t.type||'Feature'}</span></td>
      <td><span style="font-size:11px;font-family:var(--mono);color:${STATUS_DOTS[t.status]||'var(--text3)'}">${t.status}</span></td>
      <td class="${pc}" style="font-size:11px;font-family:var(--mono)">${t.priority}</td>
      <td class="muted">${fmtDate(t.updated||t.created)}</td>
      <td onclick="event.stopPropagation()"><button class="btn btn-danger btn-sm" onclick="deleteTaskById('${t.id}')">×</button></td>
    </tr>`;
  }).join('');
}

// ─── TAGS ──────────────────────────────────────────────────
function renderTags(tags) {
  const d = document.getElementById('tags-display');
  d.innerHTML = tags.map(tag=>`<span class="tag-chip">${esc(tag)}<button onclick="removeTag('${esc(tag)}')">×</button></span>`).join('');

function handleTagInput(e) {
  if (e.key==='Enter'||e.key===',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,/g,'');
    if (!val) return;
    const t = state.tasks.find(x => x.id===currentTaskId);
    if (t) { if (!t.tags) t.tags=[]; if (!t.tags.includes(val)) t.tags.push(val); t.updated=new Date().toISOString(); queueTask(t.id); renderTags(t.tags); renderView(); }
    e.target.value='';
  }
}
function removeTag(tag) {
  const t = state.tasks.find(x => x.id===currentTaskId);
  if (t) { t.tags=(t.tags||[]).filter(x=>x!==tag); t.updated=new Date().toISOString(); queueTask(t.id); renderTags(t.tags); }
}

function exportData() {

  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='devtrack-export.json'; a.click();
}
function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = async ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      state.projects = imported.projects || [];
      state.tasks = imported.tasks || [];
      state._pendingProjects = [...state.projects];
      state._pendingTasks = [...state.tasks];
      await save();
      state.activeProjectId = state.projects.length ? state.projects[0].id : null;
      renderSidebar();
      if (state.activeProjectId) activateProject(state.activeProjectId, false);
    } catch(err) { alert('Invalid file'); }
  };
  r.readAsText(file); e.target.value='';
}

// ─── UTILS ─────────────────────────────────────────────────
function uid(){return([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(iso) { if (!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}); }
function fmtDateTime(iso) { if (!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }

// ─── SEED ──────────────────────────────────────────────────
async function seedIfEmpty() {
  if (state.projects.length) return;
  const pid = uid();
  state.projects.push({id:pid,name:'My First App',description:'Demo project',stack:'HTML / CSS / JS',status:'Active',color:'#4f8eff',created:new Date().toISOString()});
  const types=['Feature','Bug','Idea','Feature','Fix','Chore'];
  const statuses=['Backlog','Todo','In Progress','In Progress','Review','Done'];
  const titles=['Design landing page','Login crash on Safari','Dark mode toggle','User settings panel','Fix form validation','Set up repo'];
  const priorities=['High','Critical','Medium','High','Medium','Low'];
  titles.forEach((title,i) => {
    state.tasks.push({id:uid(),projectId:pid,title,task_type:types[i],status:statuses[i],priority:priorities[i],description:'',prompt:'',tags:i===0?['ui','design']:i===1?['safari','auth']:[],notes:[],created:new Date(Date.now()-i*86400000).toISOString(),updated:new Date(Date.now()-i*3600000).toISOString(),archived:false});
  });
  state._pendingProjects = [...state.projects];
  state._pendingTasks = [...state.tasks];
  await save();
  activateProject(pid, false);
}
</script>

<!-- LOADING SCREEN -->
<div id="loading-screen" style="
  position:fixed;inset:0;background:var(--bg);z-index:1000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
">
  <div style="font-family:var(--mono);font-size:22px;color:var(--text)">dev<span style="color:var(--accent)">track</span></div>
  <div style="width:160px;height:2px;background:var(--bg3);border-radius:99px;overflow:hidden">
    <div id="loading-bar" style="height:100%;width:0%;background:var(--accent);border-radius:99px;transition:width .4s ease"></div>
  </div>
</div>

<!-- AUTH WALL -->
<div id="auth-wall" style="
  position:fixed;inset:0;background:var(--bg);z-index:999;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;
">
  <div style="font-family:var(--mono);font-size:24px;color:var(--text);margin-bottom:8px">
    dev<span style="color:var(--accent)">track</span>
  </div>
  <p style="font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:8px">your projects, anywhere</p>
  <input id="auth-email" type="email" placeholder="email address"
    style="background:var(--bg3);border:1px solid var(--border2);color:var(--text);
    font-family:var(--sans);font-size:13px;padding:9px 13px;border-radius:var(--radius);
    outline:none;width:280px;transition:border-color .15s"
    onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border2)'"
    onkeydown="if(event.key==='Enter')authSignIn()">
  <input id="auth-pass" type="password" placeholder="password"
    style="background:var(--bg3);border:1px solid var(--border2);color:var(--text);
    font-family:var(--sans);font-size:13px;padding:9px 13px;border-radius:var(--radius);
    outline:none;width:280px;transition:border-color .15s"
    onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border2)'"
    onkeydown="if(event.key==='Enter')authSignIn()">
  <p id="auth-msg" style="color:var(--red);font-size:11px;font-family:var(--mono);min-height:14px;margin:0"></p>
  <div style="display:flex;gap:8px;width:280px">
    <button onclick="authSignIn()" style="
      flex:1;background:var(--accent);border:1px solid var(--accent);color:#fff;
      font-family:var(--sans);font-size:13px;padding:9px;border-radius:var(--radius);cursor:pointer;
      transition:background .15s" onmouseover="this.style.background='#6a9fff'" onmouseout="this.style.background='var(--accent)'">
      Sign in
    </button>
    <button onclick="authSignUp()" style="
      flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);
      font-family:var(--sans);font-size:13px;padding:9px;border-radius:var(--radius);cursor:pointer;
      transition:background .15s" onmouseover="this.style.background='var(--bg4)'" onmouseout="this.style.background='var(--bg3)'">
      Sign up
    </button>
  </div>
  <button onclick="authSignOut()" style="
    margin-top:4px;background:none;border:none;color:var(--text3);
    font-size:11px;font-family:var(--mono);cursor:pointer;text-decoration:underline">
    sign out / switch account
  </button>
</div>

<!-- MOBILE OVERLAY -->
<div id="mobile-overlay" onclick="closeSidebar()"></div>

<!-- MOBILE NAV -->
<nav id="mobile-nav">
  <button class="mobile-nav-btn active" id="mnav-projects" onclick="mobileNavProjects()">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Projects
  </button>
  <button class="mobile-nav-btn" id="mnav-board" onclick="mobileNavBoard()">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="15" rx="1"/></svg>
    Board
  </button>
  <button class="mobile-nav-btn" id="mnav-task" onclick="openNewTask()" id="mnav-newtask">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    New task
  </button>
  <button class="mobile-nav-btn" id="mnav-table" onclick="mobileNavTable()">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
    Table
  </button>
</nav>

<script>
// ─── MOBILE NAV ────────────────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('mobile-overlay');
  const isOpen = sidebar.classList.contains('mobile-visible');
  if (isOpen) { closeSidebar(); } else { sidebar.classList.add('mobile-visible'); overlay.classList.add('active'); }
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-visible');
  document.getElementById('mobile-overlay').classList.remove('active');
}
function mobileNavProjects() {
  toggleSidebar();
  setMobileNav('projects');
}
function mobileNavBoard() {
  closeSidebar();
  switchView('kanban');
  setMobileNav('board');
}
function mobileNavTable() {
  closeSidebar();
  switchView('table');
  setMobileNav('table');
}
function setMobileNav(tab) {
  document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));
  const map = { projects: 'mnav-projects', board: 'mnav-board', table: 'mnav-table' };
  if (map[tab]) document.getElementById(map[tab])?.classList.add('active');
}

// Close sidebar when project selected on mobile
const __origActivateProject = activateProject;
window.activateProject = function(id, doSave=true) {
  __origActivateProject(id, doSave);
  if (window.innerWidth <= 1024) {
    setTimeout(() => { closeSidebar(); setMobileNav('board'); }, 200);
  }
};
</script>
</body>
</html>
