<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevTrack</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%234f8eff'/></svg>">
</head>
<body data-theme="dark">

  <!-- APP SHELL -->
  <div id="app">

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div id="sidebar-logo">
        <span class="logo-dot"></span>
        <span class="logo-text">dev<span>track</span></span>
        <button id="sidebar-collapse-btn" title="Collapse sidebar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>

      <div id="sidebar-scroll">
        <div class="sidebar-section">
          <div class="sidebar-section-label">Projects</div>
          <div id="projects-list">
            <!-- Populated by projects.js -->
          </div>
          <button id="btn-new-project" class="sidebar-item" style="margin-top:8px;color:var(--accent)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span class="sidebar-label">New Project</span>
          </button>
          <button id="btn-join-project" class="sidebar-item" style="color:var(--text-dim)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx='8.5' cy='7' r='4'/><line x1='20' y1='8' x2='20' y2='14'/><line x1='17' y1='11' x2='23' y2='11'/></svg>
            <span class="sidebar-label">Join Project</span>
          </button>
        </div>
      </div>
    </aside>

    <!-- MOBILE OVERLAY -->
    <div id="sidebar-overlay" class="mobile-overlay"></div>

    <!-- TOPBAR -->
    <header id="topbar">
      <button id="btn-sidebar-toggle" class="btn btn-icon btn-ghost" title="Projects" aria-label="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div id="topbar-title">
        <span id="proj-title-text">Select a project</span>
      </div>

      <div id="topbar-actions">
        <button id="btn-add-task" class="btn btn-primary btn-sm" title="Add Task" style="display:none">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Task
        </button>
        <button id="btn-theme-toggle" class="btn btn-icon btn-ghost" title="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button id="btn-notifications" class="btn btn-icon btn-ghost" title="Notifications" style="position:relative">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
        <div id="topbar-avatar" class="avatar avatar-sm" style="cursor:pointer">U</div>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main id="main">
      <!-- VIEW TOOLBAR -->
      <div id="view-toolbar">
        <div class="view-tabs">
          <div class="view-tab active" data-view="kanban">Kanban</div>
          <div class="view-tab" data-view="table">Table</div>
          <div class="view-tab" data-view="upcoming">Upcoming</div>
          <div class="view-tab" data-view="roadmap">Roadmap</div>
        </div>

        <div id="filter-bar" style="margin-left:auto">
          <!-- Populated by tasks.js -->
        </div>
        <button id="btn-export" class="btn btn-ghost btn-sm" title="Export tasks" style="flex-shrink:0;gap:5px;display:none">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
      </div>

      <!-- FOCUS STRIP -->
      <div id="focus-strip" class="hidden"></div>

      <!-- VIEW CONTAINER -->
      <div id="view-container">
        <!-- No Project State -->
        <div id="no-project" class="empty-state" style="display:none;height:100%">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
          <h3>Welcome to DevTrack</h3>
          <p>Select a project from the sidebar or create a new one to get started.</p>
        </div>

        <!-- Project View -->
        <div id="project-view" style="display:none;height:100%;flex-direction:column;overflow:hidden">
          <div id="project-header" style="display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2" style="flex-shrink:0"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            <span id="left-off-text" contenteditable="true"
              style="flex:1;font-size:12px;color:var(--text-muted);outline:none;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"
              data-placeholder="Note where you left off…"></span>
            <button id="btn-save-wilo" class="btn btn-ghost btn-sm" style="font-size:11px;opacity:0;pointer-events:none;flex-shrink:0">Save</button>
            <button id="decision-log-box" class="btn btn-ghost btn-sm" style="font-size:11px;flex-shrink:0;gap:5px">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              Log
            </button>
          </div>

          <div id="kanban-board">
            <!-- Populated by kanban.js -->
          </div>
        </div>
      </div>
    </main>

  </div>

  <!-- MOBILE BOTTOM NAV -->
  <nav class="mobile-nav" aria-label="Mobile navigation">
    <div class="mobile-nav-grid">
      <button class="mobile-nav-btn" id="mobile-nav-projects" title="Projects">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
        <span>Projects</span>
      </button>
      <button class="mobile-nav-btn active" id="mobile-nav-board" title="Board">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Board</span>
      </button>
      <button class="mobile-nav-btn" id="mobile-nav-detail" title="Task Detail">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6" stroke-linecap="round" stroke-width="2.5"/><line x1="3" y1="12" x2="3.01" y2="12" stroke-linecap="round" stroke-width="2.5"/><line x1="3" y1="18" x2="3.01" y2="18" stroke-linecap="round" stroke-width="2.5"/></svg>
        <span>Detail</span>
      </button>
    </div>
  </nav>

  <!-- DETAIL PANEL (Slides from right) -->
  <div id="detail-panel">
    <!-- Populated by collaboration.js -->
  </div>

  <!-- PROFILE PANEL (Dropdown) -->
  <div id="profile-panel" class="profile-panel hidden">
    <!-- Populated by auth.js -->
  </div>

  <!-- NOTIFICATIONS BACKDROP + PANEL -->
  <div id="notifications-backdrop"></div>
  <div id="notifications-panel">
    <div class="notif-header">
      <div class="notif-title">Notifications</div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn btn-ghost btn-sm" id="btn-mark-all-read">Mark all read</button>
        <button class="modal-close-btn" id="btn-close-notifications">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
    <div id="notif-list" class="notif-list">
      <!-- Populated by app.js -->
    </div>
  </div>

  <!-- GLOBAL LOADER -->
  <div id="global-loader" class="hidden">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <div class="loader-text">dev<span>track</span></div>
    </div>
  </div>

  <!-- MODULE ENTRY POINT -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
